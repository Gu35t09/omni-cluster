---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kasten-certificates-greyroom-net-production
  namespace: kasten
spec:
  secretName: kasten-certificates-greyroom-net-production
  issuerRef:
    name: issuer-letsencrypt-production
    kind: ClusterIssuer
  commonName: "kasten.omni.greyroom.net"
  dnsNames:
    - "kasten.omni.greyroom.net"
